$kind: http-request
name: Create Customer
method: POST
url: '{{baseUrl}}/customers'
order: 3000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "name": "Jane Doe",
      "email": "jane@example.com"
    }
