$kind: http-request
name: Create Order
method: POST
url: '{{baseUrl}}/orders'
order: 2000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "customer_id": "{{customerId}}",
      "products": [
        {
          "id": "{{productId}}",
          "quantity": 2
        }
      ]
    }
