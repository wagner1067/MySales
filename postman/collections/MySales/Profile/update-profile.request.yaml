$kind: http-request
name: Update Profile
method: PATCH
url: '{{baseUrl}}/profiles'
order: 2000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "newpassword",
      "old_password": "123456"
    }
